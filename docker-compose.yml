services:
  # ─── MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Express API ────────────────────────────────────────────
  api:
    image: ghcr.io/enockmagara/safipoints-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/safipoints
      - NODE_ENV=production
      - PORT=5002
    depends_on:
      mongo:
        condition: service_healthy

  # ─── React Frontend ────────────────────────────────────────
  client:
    image: ghcr.io/enockmagara/safipoints-client:latest
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - client

volumes:
  mongo_data:
